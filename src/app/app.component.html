<div class="panel" [ngClass]="panelThemeClass">
  <app-navbar (themeChange)="requestThemeChange($event)" (toggleMenuEvent)="menuOpen = $event"
    [menuOpen]="menuOpen" ></app-navbar>

  <div class="overlay-container" [class.open]="menuOpen"></div>

  <div 
    *ngIf="showOverlay"
    class="transition-overlay"
    [class.active]="isTransitioning">
  </div>

  <div class="content">
    <router-outlet (activate)="startTransition()"></router-outlet>
  </div>

</div>
