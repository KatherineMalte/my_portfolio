<div 
class="panel"
[ngClass]="panelThemeClass"><div class="panel-content">
<app-intro-overlay *ngIf="showIntro" [introColor]="color"
 (finished)="showIntro = false">
 
</app-intro-overlay>

  <!-- Navbar -->
  <app-navbar 
    [menuOpen]="menuOpen"
    (menuAction)="handleMenuAction($event)"
    [logo]="logoPath" [colorLogo]="colorLogo"
    >
  </app-navbar>

  <!-- Panel gris / menú -->
  <div class="overlay-container" 
   [style.background-color]="color || null"
   [class.open]="menuOpen">
  </div>

  <!-- Overlay de transición -->
  <div 
  class="transition-overlay" 
  [class.active]="isTransitioning" 
  [class.fading-out]="isFadingOut">
  </div>

  <!-- Contenido de la app -->
  <div class="content">
    <router-outlet (activate)="startTransition()"></router-outlet>
  </div>

</div></div>
