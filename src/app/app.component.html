<div class="panel" [ngClass]="panelThemeClass">
  <app-navbar
    (themeChange)="onThemeChange($event)"
    (toggleMenuEvent)="menuOpen = $event"
  ></app-navbar>

  <div class="overlay-container" [class.open]="menuOpen"></div>

  <div class="transition-overlay" [class.active]="isTransitioning" [class.leave]="isLeaving"></div>

  <div class="content">
    <router-outlet></router-outlet>
  </div>
</div>
